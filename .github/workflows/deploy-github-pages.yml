# Publishes the static Directory site to GitHub Pages on every push to `master`.
# One-time repo setup: Settings → Pages → Build and deployment → Source: **GitHub Actions**.
# Custom domain (e.g. propart.app): Settings → Pages → Custom domain, plus DNS CNAME per GitHub docs.

name: Deploy Directory to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
