        const MagicIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 4-3 3m3-3 3 3m-3-3v12m-6-6h12"/><path d="M4 20h4l10.5-10.5a2.12 2.12 0 0 0 0-3 2.12 2.12 0 0 0-3 0L5 17v3z"/></svg>);
        const LockIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>);
        const UnlockIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>);

        // Professional SVG Clipart Library with gradients and shadows
        const clipartLibrary = [
            // ...existing SVG clipart...
            { id: 'african-woman-pixabay', name: 'African Woman Portrait', src: 'https://cdn.pixabay.com/photo/2023/01/01/20/01/11/african-woman-8035495_1280.png', attribution: 'Pixabay' },
            { id: 'black-race-egyptian', name: 'Black Race Egyptian', src: 'https://cdn.pixabay.com/photo/2023/09/01/23/24/47/black-race-8390919_1280.png', attribution: 'Pixabay' },
            { id: 'sitting-lady', name: 'Sitting Lady Portrait', src: 'https://cdn.pixabay.com/photo/2018/07/01/00/48/33/sitting-lady-2665587_1280.png', attribution: 'Pixabay' },
            { id: 'yes-positive', name: 'Yes Positive', src: 'https://cdn.pixabay.com/photo/2021/06/26/12/42/46/yes-positive-7820643_1280.png', attribution: 'Pixabay' },
            { id: 'gratitude-prayer', name: 'Gratitude Prayer', src: 'https://cdn.pixabay.com/photo/2016/03/31/19/56/gratitude-1251137_1280.png', attribution: 'Pixabay' },
            { id: 'affirmation-wordart', name: 'Affirmation Word Art', src: 'https://cdn.pixabay.com/photo/2017/01/31/19/14/affirmation-2025986_1280.png', attribution: 'Pixabay' },
            { id: 'love-heart-pexels', name: 'I Love You Heart', src: 'https://images.pexels.com/photos/730801/pexels-photo-730801.jpeg', attribution: 'Pexels' },
            { id: 'advice-lettering', name: 'Advice Lettering', src: 'https://images.pexels.com/photos/5697261/pexels-photo-5697261.jpeg', attribution: 'Pexels' },
            { id: 'support-small-biz', name: 'Support Small Biz', src: 'https://images.pexels.com/photos/5697248/pexels-photo-5697248.jpeg', attribution: 'Pexels' },
            { id: 'here-to-help', name: 'Here to Help', src: 'https://images.pexels.com/photos/5697255/pexels-photo-5697255.jpeg', attribution: 'Pexels' },
            { id: 'thumb-up', name: 'Thumb Up', src: 'https://images.pexels.com/photos/8831814/pexels-photo-8831814.jpeg', attribution: 'Pexels' },
            { id: 'letters-arranged', name: 'Letters Arranged', src: 'https://images.pexels.com/photos/6005064/pexels-photo-6005064.jpeg', attribution: 'Pexels' },
        ];
        
        const shapesOptions = {
            circle: { draw: (ctx, w, h) => { ctx.beginPath(); ctx.arc(0, 0, Math.min(w, h) / 2, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); } },
            square: { draw: (ctx, w, h) => { ctx.fillRect(-w/2, -h/2, w, h); ctx.strokeRect(-w/2, -h/2, w, h); } },
            triangle: { draw: (ctx, w, h) => { ctx.beginPath(); ctx.moveTo(0, -h/2); ctx.lineTo(w/2, h/2); ctx.lineTo(-w/2, h/2); ctx.closePath(); ctx.fill(); ctx.stroke(); } },
            star: { draw: (ctx, w, h) => { const spikes = 5; const outerR = Math.min(w, h) / 2; const innerR = outerR / 2.5; ctx.beginPath(); for (let i = 0; i < spikes * 2; i++) { const angle = (i * Math.PI) / spikes - Math.PI / 2; const r = i % 2 === 0 ? outerR : innerR; ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle)); } ctx.closePath(); ctx.fill(); ctx.stroke(); } },
            heart: { draw: (ctx, w, h) => { 
                ctx.save();
                ctx.translate(0, -h * 0.1);
                ctx.beginPath();
                const topCurveHeight = h * 0.3;
                ctx.moveTo(0, topCurveHeight);
                ctx.bezierCurveTo(0, 0, -w/2, 0, -w/2, topCurveHeight);
                ctx.bezierCurveTo(-w/2, (h + topCurveHeight)/2, 0, (h + topCurveHeight)/1.5, 0, h);
                ctx.bezierCurveTo(0, (h + topCurveHeight)/1.5, w/2, (h + topCurveHeight)/2, w/2, topCurveHeight);
                ctx.bezierCurveTo(w/2, 0, 0, 0, 0, topCurveHeight);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            } }
        };

        const loadImage = (src) => new Promise((resolve, reject) => { const img = new Image(); img.crossOrigin = 'anonymous'; img.onload = () => resolve(img); img.onerror = (err) => reject(err); img.src = src; });
        
        const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => { 
            const words = text.split(' '); 
            let line = ''; 
            const lines = [];
            for(let n = 0; n < words.length; n++) { 
                const testLine = line + words[n] + ' '; 
                const metrics = ctx.measureText(testLine); 
                const testWidth = metrics.width; 
                if (testWidth > maxWidth && n > 0) { 
                    lines.push(line);
                    line = words[n] + ' '; 
                } else { 
                    line = testLine; 
                } 
            } 
            lines.push(line);
            lines.forEach((line, i) => {
                ctx.fillText(line, x, y + (i * lineHeight));
            });
        };

        const drawCardToCanvas = async (ctx, card, themeBackground, scale = 1, selectedElementId = null, gridOptions = { show: false, size: 40, center: true }) => {
            if (!ctx || !card) return;
            const { width, height } = ctx.canvas;
            
            // Background
            switch(themeBackground.type) {
                case 'linear': 
                    const lg = ctx.createLinearGradient(0, 0, width, height); 
                    lg.addColorStop(0, themeBackground.color1); 
                    lg.addColorStop(1, themeBackground.color2); 
                    ctx.fillStyle = lg; 
                    break;
                case 'radial': 
                    const rg = ctx.createRadialGradient(width/2, height/2, 5, width/2, height/2, width/1.5); 
                    rg.addColorStop(0, themeBackground.color1); 
                    rg.addColorStop(1, themeBackground.color2); 
                    ctx.fillStyle = rg; 
                    break;
                default: 
                    ctx.fillStyle = themeBackground.color1; 
                    break;
            }
            ctx.fillRect(0, 0, width, height);

            if (themeBackground.image) { 
                try { 
                    const img = await loadImage(themeBackground.image); 
                    ctx.drawImage(img, 0, 0, width, height); 
                } catch (e) { 
                    console.error("Could not load background image", e); 
                }
            }

            // Grid
            if (gridOptions?.show) {
                const gridSize = Math.max(10, gridOptions.size || 40) * scale;
                ctx.save();
                ctx.strokeStyle = 'rgba(219, 39, 119, 0.15)';
                ctx.lineWidth = 1;
                for (let x = 0; x <= width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                for (let y = 0; y <= height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                if (gridOptions.center) {
                    ctx.strokeStyle = 'rgba(219, 39, 119, 0.4)';
                    ctx.setLineDash([8, 8]);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(width / 2, 0);
                    ctx.lineTo(width / 2, height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, height / 2);
                    ctx.lineTo(width, height / 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                ctx.restore();
            }
            
            // Load images
            const imageElements = card.elements.filter(el => (el.type === 'image') && el.src);
            const loadedImages = await Promise.all(
                imageElements.map(el => loadImage(el.src).then(img => ({ id: el.id, img })))
            ).catch(err => { console.error("Error loading images:", err); return []; });
            const imageMap = new Map(loadedImages.map(item => [item.id, item.img]));

            // Draw elements
            const sortedElements = [...card.elements].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0)).filter(el => !el.locked || selectedElementId === el.id);
            sortedElements.forEach(el => {
                if (el.locked && selectedElementId !== el.id) return;
                
                ctx.save();
                ctx.globalAlpha = el.opacity !== undefined ? el.opacity : 1;
                ctx.translate(el.x * scale, el.y * scale);
                ctx.rotate((el.rotation || 0) * Math.PI / 180);
                
                ctx.fillStyle = el.fillStyle || '#000000';
                ctx.strokeStyle = el.strokeStyle || '#000000';
                ctx.lineWidth = (el.strokeWidth || 0) * scale;
                
                switch (el.type) {
                    case 'text': 
                        const fs = parseFloat(el.fontSize || el.font || 48) * scale; 
                        const fontFamily = el.fontFamily || 'Inter';
                        const fontWeight = el.fontWeight || '400';
                        ctx.font = `${fontWeight} ${fs}px ${fontFamily}`; 
                        ctx.textAlign = el.textAlign || 'center'; 
                        ctx.textBaseline = 'middle';
                        
                        // Text shadow
                        if (el.shadowBlur) {
                            ctx.shadowColor = el.shadowColor || 'rgba(0,0,0,0.5)';
                            ctx.shadowBlur = el.shadowBlur * scale;
                            ctx.shadowOffsetX = (el.shadowX || 0) * scale;
                            ctx.shadowOffsetY = (el.shadowY || 0) * scale;
                        }
                        
                        if (el.strokeWidth) ctx.strokeText(el.content, 0, 0);
                        wrapText(ctx, el.content, 0, 0, (el.width || 300) * scale, fs * 1.3); 
                        break;
                        
                    case 'image': 
                        const img = imageMap.get(el.id); 
                        if (img) { 
                            const w = (el.width || 100) * scale;
                            const h = (el.height || 100) * scale;
                            if (el.borderRadius) {
                                ctx.save();
                                ctx.beginPath();
                                const radius = (el.borderRadius || 0) * scale;
                                ctx.moveTo(-w/2 + radius, -h/2);
                                ctx.arcTo(w/2, -h/2, w/2, -h/2 + radius, radius);
                                ctx.arcTo(w/2, h/2, w/2 - radius, h/2, radius);
                                ctx.arcTo(-w/2, h/2, -w/2, h/2 - radius, radius);
                                ctx.arcTo(-w/2, -h/2, -w/2 + radius, -h/2, radius);
                                ctx.closePath();
                                ctx.clip();
                            }
                            
                            // Image filter
                            if (el.filter) {
                                ctx.filter = el.filter;
                            }
                            
                            ctx.drawImage(img, -w/2, -h/2, w, h); 
                            if (el.borderRadius) ctx.restore();
                        } 
                        break;
                        
                    case 'shape':
                        const shapeFunc = shapesOptions[el.shape];
                        if (shapeFunc) {
                            const w = (el.width || 100) * scale;
                            const h = (el.height || 100) * scale;
                            shapeFunc.draw(ctx, w, h);
                        }
                        break;
                        
                    case 'emoji':
                        const emojiSize = (el.fontSize || 64) * scale;
                        ctx.font = `${emojiSize}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(el.content, 0, 0);
                        break;
                    
                    case 'clipart':
                        if (el.svg) {
                            const w = (el.width || 100) * scale;
                            const h = (el.height || 100) * scale;
                            const tempImg = new Image();
                            const svgBlob = new Blob([el.svg], { type: 'image/svg+xml' });
                            const url = URL.createObjectURL(svgBlob);
                            tempImg.src = url;
                            if (tempImg.complete) {
                                ctx.drawImage(tempImg, -w/2, -h/2, w, h);
                            } else {
                                tempImg.onload = () => {
                                    ctx.save();
                                    ctx.translate(el.x * scale, el.y * scale);
                                    ctx.rotate((el.rotation || 0) * Math.PI / 180);
                                    ctx.globalAlpha = el.opacity !== undefined ? el.opacity : 1;
                                    ctx.drawImage(tempImg, -w/2, -h/2, w, h);
                                    ctx.restore();
                                    URL.revokeObjectURL(url);
                                };
                            }
                        }
                        break;
                }
                ctx.restore();
            });

            // Selection box
            const selectedElement = card.elements.find(el => el.id === selectedElementId);
            if (selectedElement && scale === 1) {
                ctx.save();
                ctx.translate(selectedElement.x * scale, selectedElement.y * scale);
                ctx.rotate((selectedElement.rotation || 0) * Math.PI / 180);
                const w = (selectedElement.width || 100) * scale;
                const h = (selectedElement.height || 100) * scale;
                
                // Selection border
                ctx.strokeStyle = '#db2777'; 
                ctx.lineWidth = 3; 
                ctx.setLineDash([10, 5]);
                ctx.strokeRect(-w/2 - 5, -h/2 - 5, w + 10, h + 10);
                ctx.setLineDash([]);
                
                // Corner handles
                const handleSize = 12;
                const positions = [
                    [-w/2, -h/2], [w/2, -h/2], [w/2, h/2], [-w/2, h/2],
                    [0, -h/2], [w/2, 0], [0, h/2], [-w/2, 0]
                ];
                positions.forEach(([x, y]) => {
                    ctx.fillStyle = 'white';
                    ctx.strokeStyle = '#db2777';
                    ctx.lineWidth = 2;
                    ctx.fillRect(x - handleSize/2, y - handleSize/2, handleSize, handleSize);
                    ctx.strokeRect(x - handleSize/2, y - handleSize/2, handleSize, handleSize);
                });
                
                // Rotation handle
                ctx.beginPath();
                ctx.moveTo(0, -h/2 - 5);
                ctx.lineTo(0, -h/2 - 30);
                ctx.strokeStyle = '#db2777';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, -h/2 - 30, 10, 0, 2 * Math.PI);
                ctx.fillStyle = '#db2777';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }

                    if (!snapToGrid || typeof value !== 'number') return value;
                    if (['x', 'y', 'width', 'height'].includes(key)) return snapValue(value, snapSize);
                    return value;

                const snappedProps = Object.fromEntries(
                    Object.entries(newProps).map(([key, value]) => [key, maybeSnap(key, value)])

                        elements: card.elements.map(el =>

            const changeZIndex = (direction) => {
                if (!selectedElement) return;
                const elements = [...activeCard.elements];
                const currentIndex = elements.findIndex(el => el.id === selectedElementId);
                if (currentIndex === -1) return;
                
                if (direction === 'front') {
                    const maxZ = Math.max(...elements.map(el => el.zIndex || 0));
                    updateElement(selectedElementId, { zIndex: maxZ + 1 }, true);
                } else if (direction === 'back') {
                    const minZ = Math.min(...elements.map(el => el.zIndex || 0));
                    updateElement(selectedElementId, { zIndex: minZ - 1 }, true);
                } else {
                    const newIndex = direction === 'up' 
                        ? Math.min(currentIndex + 1, elements.length - 1)
                        : Math.max(currentIndex - 1, 0);
                    
                    [elements[currentIndex], elements[newIndex]] = [elements[newIndex], elements[currentIndex]];
                    
                    elements.forEach((el, idx) => {
                        el.zIndex = idx;
                    });
                    
                    const newCards = cards.map((c, i) =>
                        i === selectedCardIndex ? { ...c, elements } : c

                    setCards(newCards);
                    saveStateToHistory(newCards);

            const handleCanvasMouseDown = (e) => {
                if (!canvasRef.current || !activeCard) return;
                
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                // Find clicked element (reverse order to respect z-index)
                const sortedElements = [...activeCard.elements].sort((a, b) => (b.zIndex || 0) - (a.zIndex || 0)).filter(el => !el.locked);
                const clickedElement = sortedElements.find(el => {
                    const dx = x - el.x;
                    const dy = y - el.y;
                    const cos = Math.cos(-el.rotation * Math.PI / 180);
                    const sin = Math.sin(-el.rotation * Math.PI / 180);
                    const rotatedX = dx * cos - dy * sin;
                    const rotatedY = dx * sin + dy * cos;
                    
                    return Math.abs(rotatedX) <= (el.width || 100) / 2 && 
                           Math.abs(rotatedY) <= (el.height || 100) / 2;
                });
                
                if (clickedElement) {
                    setSelectedElementId(clickedElement.id);
                    setDragState({
                        isDragging: true,
                        startX: x,
                        startY: y,
                        offsetX: x - clickedElement.x,
                        offsetY: y - clickedElement.y,
                        handle: 'move'
                    });
                } else {
                    setSelectedElementId(null);
                }
            };

                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                if (dragState.handle === 'move') {
                    updateElement(selectedElementId, {
                        x: x - dragState.offsetX,
                        y: y - dragState.offsetY
                    });
                }
            };

            const handleCanvasMouseUp = () => {
                if (dragState.isDragging) {
                    setDragState({ isDragging: false, startX: 0, startY: 0, offsetX: 0, offsetY: 0, handle: null });
                    if (selectedElement) {
                        saveStateToHistory(cards);
                    }

                        if (newHeight > containerHeight) { 
                            newHeight = containerHeight; 
                            newWidth = newHeight * cardAspectRatio;

                        canvas.width = newWidth; 
                        canvas.height = newHeight;

                            case 'y': e.preventDefault(); redo(); break;
                            case 'd': e.preventDefault(); duplicateElement(); break;
                            case 's': e.preventDefault(); saveTheme(); break;
                            case 'l': e.preventDefault(); if (selectedElement) toggleLock(); break;
                        }
                    }
                    if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (selectedElementId && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                            e.preventDefault();
                            deleteSelectedElement();
                        }
                    }
                    if (selectedElementId && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        const step = e.shiftKey ? 10 : 1;
                        let updates = {};
                        switch(e.key) {
                            case 'ArrowLeft': updates.x = selectedElement.x - step; break;
                            case 'ArrowRight': updates.x = selectedElement.x + step; break;
                            case 'ArrowUp': updates.y = selectedElement.y - step; break;
                            case 'ArrowDown': updates.y = selectedElement.y + step; break;
                        }
                        if (Object.keys(updates).length > 0) {
                            e.preventDefault();
                            updateElement(selectedElementId, updates, false);
                        }
                    }
                };

                    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key) && selectedElementId) {
                        saveStateToHistory(cards);
                    }
                };
                
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);

                                    onClick={applyTemplateToAll} 
                                    className="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xs font-bold py-2 px-2 rounded-lg hover:from-amber-500 hover:to-orange-600 transition-all shadow-md mb-3"
                                    title="Use current card as template for all cards"
                                >
                                    âœ¨ Template
                                </button>
                                
                                <div className="space-y-2">
                                    {cards.map((card, index) => (
                                        <button
                                            key={card.id}
                                            onClick={() => {
                                                setSelectedCardIndex(index);
                                                setSelectedElementId(null);
                                            }}
                                            className={`card-thumbnail w-full h-28 flex items-center justify-center rounded-lg font-bold text-xl transition-all duration-300 ${
                                                selectedCardIndex === index 
                                                    ? 'active bg-gradient-to-br from-pink-200 to-rose-200 text-pink-800 border-4 border-pink-500' 
                                                    : 'bg-gradient-to-br from-gray-100 to-gray-200 text-gray-500 border-2 border-gray-300 hover:border-pink-300'
                                            }`}
                                        >
                                            {index + 1}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </aside>
                        </>
                        )}
                        
                        {/* Business Tab */}
                        {activeTab === 'business' && (
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-8 bg-gradient-to-br from-purple-50 to-pink-50">
                                <div className="max-w-7xl mx-auto space-y-8">
                                    <h2 className="text-4xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent flex items-center gap-3">
                                        ðŸ’¼ Business Hub - Print on Demand Management
                                    </h2>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {/* Project Checklist */}
                                        <div className="gradient-border p-6 bg-white animate-fade-in">
                                            <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                âœ… Project Checklist
                                                <span className="text-sm bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">
                                                    {projectChecklist.filter(item => item.completed).length}/{projectChecklist.length}
                                                </span>
                                            </h3>
                                            <div className="space-y-2">
                                                {projectChecklist.map(item => (
                                                    <label
                                                        key={item.id}
                                                        className={`flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all ${
                                                            item.completed 
                                                                ? 'bg-green-50 border-2 border-green-300' 
                                                                : 'bg-gray-50 border-2 border-gray-200 hover:border-purple-300'
                                                        }`}
                                                    >
                                                        <input
                                                            type="checkbox"
                                                            checked={item.completed}
                                                            onChange={() => toggleChecklistItem(item.id)}
                                                            className="w-5 h-5 text-purple-600 rounded focus:ring-purple-500"
                                                        />
                                                        <span className={`flex-1 font-medium ${
                                                            item.completed ? 'text-gray-500 line-through' : 'text-gray-800'
                                                        }`}>
                                                            {item.task}
                                                        </span>
                                                        {item.completed && <span className="text-green-600 text-xl">âœ“</span>}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        {/* Cost Calculator */}
                                        <div className="gradient-border p-6 bg-white animate-fade-in">
                                            <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                ðŸ’° Profit Calculator
                                            </h3>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-sm font-semibold text-gray-700 mb-1 block">Cost per Card Set</label>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold text-gray-700">$</span>
                                                        <input
                                                            type="number"
                                                            step="0.01"
                                                            value={costPerCard}
                                                            onChange={(e) => setCostPerCard(parseFloat(e.target.value) || 0)}
                                                            className="flex-1 p-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 text-lg font-semibold"
                                                        />
                                                    </div>
                                                </div>
                                                
                                                <div>
                                                    <label className="text-sm font-semibold text-gray-700 mb-1 block">Retail Price</label>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold text-gray-700">$</span>
                                                        <input
                                                            type="number"
                                                            step="0.01"
                                                            value={retailPrice}
                                                            onChange={(e) => setRetailPrice(parseFloat(e.target.value) || 0)}
                                                            className="flex-1 p-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 text-lg font-semibold"
                                                        />
                                                    </div>
                                                </div>
                                                
                                                <div>
                                                    <label className="text-sm font-semibold text-gray-700 mb-1 block">Shipping Cost</label>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold text-gray-700">$</span>
                                                        <input
                                                            type="number"
                                                            step="0.01"
                                                            value={shippingCost}
                                                            onChange={(e) => setShippingCost(parseFloat(e.target.value) || 0)}
                                                            className="flex-1 p-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 text-lg font-semibold"
                                                        />
                                                    </div>
                                                </div>
                                                
                                                <div className="pt-4 border-t-2 border-gray-200">
                                                    <div className="bg-gradient-to-br from-green-50 to-emerald-50 p-4 rounded-xl border-2 border-green-300">
                                                        <div className="flex justify-between items-center mb-2">
                                                            <span className="text-gray-700 font-semibold">Profit per Sale:</span>
                                                            <span className="text-3xl font-bold text-green-600">
                                                                ${calculateProfit().profit}
                                                            </span>
                                                        </div>
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-gray-700 font-semibold">Profit Margin:</span>
                                                            <span className="text-2xl font-bold text-green-600">
                                                                {calculateProfit().margin}%
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="gradient-border p-6 bg-white animate-fade-in">
                                        <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                            ðŸ›’ POD Quick Order Links
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                            <input
                                                value={podLinkForm.productType}
                                                onChange={(e) => setPodLinkForm(prev => ({ ...prev, productType: e.target.value }))}
                                                className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                placeholder="Product type (e.g. affirmation cards)"
                                            />
                                            <input
                                                value={podLinkForm.niche}
                                                onChange={(e) => setPodLinkForm(prev => ({ ...prev, niche: e.target.value }))}
                                                className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                placeholder="Niche (e.g. self-love)"
                                            />
                                            <input
                                                type="number"
                                                min="1"
                                                value={podLinkForm.quantity}
                                                onChange={(e) => setPodLinkForm(prev => ({ ...prev, quantity: parseInt(e.target.value, 10) || 1 }))}
                                                className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                placeholder="Quantity"
                                            />
                                            <button
                                                onClick={generatePodLinks}
                                                className="bg-purple-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-purple-700 transition-all"
                                            >
                                                Generate Links
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                            {podQuickLinks.map(link => (
                                                <div key={link.name} className="p-4 bg-gradient-to-r from-purple-50 to-pink-50 rounded-lg border-2 border-purple-200">
                                                    <div className="font-bold text-gray-800 mb-1">{link.name}</div>
                                                    <div className="text-xs text-gray-600 mb-3">{link.note}</div>
                                                    <div className="flex gap-2 flex-wrap">
                                                        <a
                                                            href={link.url}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="inline-block bg-pink-600 text-white text-sm font-bold px-3 py-1.5 rounded-lg hover:bg-pink-700"
                                                        >
                                                            Open Order Flow
                                                        </a>
                                                        {(link.name === 'Printify' || link.name === 'Printful') && (
                                                            <button
                                                                onClick={() => launchPodPreset(link.name)}
                                                                className="inline-block bg-purple-600 text-white text-sm font-bold px-3 py-1.5 rounded-lg hover:bg-purple-700"
                                                            >
                                                                One-Click Preset
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-4">
                                            <label className="text-sm font-semibold text-gray-700 mb-1 block">Preset Payload Preview (auto-copied when available)</label>
                                            <textarea
                                                readOnly
                                                value={podPresetPreview}
                                                className="w-full min-h-[180px] p-3 border-2 border-purple-200 rounded-lg font-mono text-xs bg-purple-50"
                                                placeholder="Click 'One-Click Preset' on Printify/Printful to generate payload."
                                            />
                                        </div>
                                    </div>

                                    {/* POD Order Management */}
                                    <div className="gradient-border p-6 bg-white animate-fade-in">
                                        <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                            ðŸ“¦ POD Order Tracker
                                        </h3>
                                        
                                        {/* Add Order Form */}
                                        <div className="bg-gradient-to-br from-purple-50 to-pink-50 p-4 rounded-xl mb-6 border-2 border-purple-200">
                                            <h4 className="font-bold text-gray-800 mb-3">Create New Order</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                                <select 
                                                    id="podPlatform"
                                                    className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                >
                                                    <option value="Printful">Printful</option>
                                                    <option value="Printify">Printify</option>
                                                    <option value="Zazzle">Zazzle</option>
                                                    <option value="Redbubble">Redbubble</option>
                                                    <option value="Etsy">Etsy POD</option>
                                                    <option value="Amazon">Amazon Merch</option>
                                                </select>
                                                <input
                                                    id="podQuantity"
                                                    type="number"
                                                    placeholder="Quantity"
                                                    min="1"
                                                    defaultValue="50"
                                                    className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                />
                                                <input
                                                    id="podDate"
                                                    type="date"
                                                    defaultValue={new Date().toISOString().split('T')[0]}
                                                    className="p-2.5 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 font-medium"
                                                />
                                                <button
                                                    onClick={() => {
                                                        const platform = document.getElementById('podPlatform').value;
                                                        const quantity = parseInt(document.getElementById('podQuantity').value);
                                                        const date = document.getElementById('podDate').value;
                                                        addPodOrder(platform, quantity, date);
                                                    }}
                                                    className="bg-purple-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-purple-700 transition-all"
                                                >
                                                    + Add Order
                                                </button>
                                            </div>
                                        </div>
                                        
                                        {/* Orders List */}
                                        <div className="space-y-3">
                                            {podOrders.length === 0 ? (
                                                <p className="text-center text-gray-500 py-8 italic">No orders yet. Create your first POD order above!</p>
                                            ) : (
                                                podOrders.map(order => (
                                                    <div key={order.id} className="p-4 bg-gradient-to-r from-gray-50 to-purple-50 rounded-lg border-2 border-gray-200 hover:border-purple-300 transition-all">
                                                        <div className="flex flex-wrap items-center justify-between gap-3">
                                                            <div className="flex-1">
                                                                <div className="font-bold text-lg text-gray-800">
                                                                    {order.platform} - {order.quantity} sets
                                                                </div>
                                                                <div className="text-sm text-gray-600">
                                                                    {order.themeName} ({order.cardCount} cards) â€¢ ${order.cost}
                                                                </div>
                                                                <div className="text-xs text-gray-500 mt-1">
                                                                    Order Date: {order.orderDate}
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <select
                                                                    value={order.status}
                                                                    onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                                                    className={`p-2 rounded-lg font-semibold text-sm border-2 ${
                                                                        order.status === 'completed' ? 'bg-green-100 border-green-400 text-green-800' :
                                                                        order.status === 'processing' ? 'bg-blue-100 border-blue-400 text-blue-800' :
                                                                        order.status === 'shipped' ? 'bg-purple-100 border-purple-400 text-purple-800' :
                                                                        'bg-yellow-100 border-yellow-400 text-yellow-800'
                                                                    }`}
                                                                >
                                                                    <option value="pending">â³ Pending</option>
                                                                    <option value="processing">ðŸ”„ Processing</option>
                                                                    <option value="shipped">ðŸšš Shipped</option>
                                                                    <option value="completed">âœ… Completed</option>
                                                                </select>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                    
                                    {/* Quick Stats */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div className="bg-gradient-to-br from-pink-500 to-rose-500 p-6 rounded-xl shadow-lg text-white">
                                            <div className="text-sm font-semibold opacity-90">Total Cards</div>
                                            <div className="text-4xl font-bold mt-2">{cards.length}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-purple-500 to-indigo-500 p-6 rounded-xl shadow-lg text-white">
                                            <div className="text-sm font-semibold opacity-90">Active Orders</div>
                                            <div className="text-4xl font-bold mt-2">{podOrders.filter(o => o.status !== 'completed').length}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-green-500 to-emerald-500 p-6 rounded-xl shadow-lg text-white">
                                            <div className="text-sm font-semibold opacity-90">Completed</div>
                                            <div className="text-4xl font-bold mt-2">{podOrders.filter(o => o.status === 'completed').length}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-amber-500 to-orange-500 p-6 rounded-xl shadow-lg text-white">
                                            <div className="text-sm font-semibold opacity-90">Total Revenue</div>
                                            <div className="text-4xl font-bold mt-2">
                                                ${podOrders.filter(o => o.status === 'completed').reduce((sum, o) => sum + parseFloat(o.cost), 0).toFixed(2)}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
