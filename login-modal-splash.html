<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PropArt™ login modal — branding splash using suite directory tokens.">
  <title>PropArt™ Sign in</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./propart-generic-theme.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--font-ui);
      color: var(--propart-ink);
    }

    /* Directory-style page wash + dark veil (focus on modal like your reference) */
    .login-stage {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 32px);
      position: relative;
      background:
        radial-gradient(120% 80% at 50% -10%, var(--propart-overlay-lilac), transparent),
        radial-gradient(90% 60% at 100% 30%, var(--propart-overlay-teal), transparent),
        linear-gradient(165deg, var(--propart-page-mist-start) 0%, var(--propart-page-mist-mid) 45%, var(--propart-page-mist-end) 100%);
    }
    .login-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(61, 51, 102, 0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .login-modal {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 24px 64px rgba(44, 36, 53, 0.28),
        0 8px 24px rgba(93, 80, 198, 0.18),
        inset 0 1px 0 #fff;
    }

    .login-modal__close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-sm);
      background: rgba(93, 80, 198, 0.08);
      color: var(--propart-muted);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      transition: background var(--propart-transition-fast), color var(--propart-transition-fast);
    }
    .login-modal__close:hover {
      background: rgba(93, 80, 198, 0.16);
      color: var(--propart-ink);
    }
    .login-modal__close:focus-visible {
      outline: 2px solid var(--propart-purple);
      outline-offset: 2px;
    }

    .login-modal__body {
      padding: clamp(22px, 4vw, 30px) clamp(22px, 4vw, 28px) clamp(26px, 4vw, 32px);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .login-brand__icon {
      width: 52px;
      height: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 3px 12px var(--propart-purple-glow));
    }
    .login-brand__wordmark {
      font-family: var(--font-display);
      font-size: clamp(1.55rem, 4.5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, var(--propart-eggplant), var(--propart-purple-deep), #c96b8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 0.45px rgba(255, 255, 255, 0.85);
      paint-order: stroke fill;
    }
    .login-brand__wordmark sup {
      font-size: 0.48em;
      font-weight: 800;
      vertical-align: super;
      margin-left: 0.04em;
    }

    .login-modal h1 {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 3.8vw, 1.55rem);
      font-weight: 800;
      color: var(--propart-ink);
      letter-spacing: -0.02em;
    }
    .login-lead {
      margin: 0 0 14px;
      font-size: 0.92rem;
      color: var(--propart-muted);
      line-height: 1.45;
    }
    .login-cookie {
      margin: 0 0 22px;
      font-size: 0.72rem;
      line-height: 1.45;
      color: var(--propart-muted);
      opacity: 0.92;
    }

    .login-btn-google {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--propart-border-strong);
      background: #fff;
      color: var(--propart-ink);
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 8px var(--propart-shadow-ink);
      transition: box-shadow var(--propart-transition-fast), border-color var(--propart-transition-fast);
    }
    .login-btn-google:hover {
      border-color: rgba(93, 80, 198, 0.45);
      box-shadow: 0 4px 14px var(--propart-shadow-purple);
    }
    .login-btn-google:focus-visible {
      outline: 2px solid var(--propart-purple);
      outline-offset: 2px;
    }
    .login-btn-google__g {
      font-weight: 800;
      font-size: 0.95rem;
      background: conic-gradient(from 180deg at 50% 50%, #4285f4 0deg 90deg, #34a853 90deg 180deg, #fbbc04 180deg 270deg, #ea4335 270deg 360deg);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: var(--font-ui);
    }

    .login-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 18px;
      color: var(--propart-muted);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: lowercase;
    }
    .login-or::before,
    .login-or::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--propart-border-pink), transparent);
    }

    .login-field {
      margin-bottom: 14px;
    }
    .login-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--propart-ink);
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--propart-border-strong);
      background: #fff;
      font-size: 0.92rem;
      font-family: inherit;
      color: var(--propart-ink);
      box-shadow: inset 0 1px 2px rgba(44, 36, 53, 0.04);
      transition: border-color var(--propart-transition-fast), box-shadow var(--propart-transition-fast);
    }
    .login-field input::placeholder {
      color: var(--propart-muted);
      opacity: 0.75;
    }
    .login-field input:focus {
      outline: none;
      border-color: rgba(93, 80, 198, 0.55);
      box-shadow: 0 0 0 3px rgba(93, 80, 198, 0.12), inset 0 1px 2px rgba(44, 36, 53, 0.04);
    }

    .login-actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-actions .propart-btn-primary {
      width: 100%;
      padding: 12px 18px;
      font-size: 0.9rem;
    }

    .login-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 0.84rem;
      color: var(--propart-muted);
    }
    .login-footer a {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="login-stage" role="presentation">
    <div
      class="login-modal propart-surface-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="login-title"
      aria-describedby="login-desc"
    >
      <span class="propart-accent-strip" aria-hidden="true"></span>
      <button type="button" class="login-modal__close" aria-label="Close sign in" onclick="document.querySelector('.login-stage').style.display='none'">×</button>
      <div class="login-modal__body">
        <div class="login-brand" aria-hidden="true">
          <img class="login-brand__icon" src="./propart-logo.svg" alt="" width="52" height="76" decoding="async">
          <span class="login-brand__wordmark">PropArt<sup>™</sup></span>
        </div>
        <h1 id="login-title">Welcome back</h1>
        <p id="login-desc" class="login-lead">Sign in to pick up where you left off in the suite.</p>
        <p class="login-cookie">
          We use cookies and similar technologies to keep you signed in and to improve PropArt™ experiences.
          By continuing you agree to our suite terms and privacy practices.
        </p>

        <button type="button" class="login-btn-google">
          <span class="login-btn-google__g" aria-hidden="true">G</span>
          Continue with Google
        </button>

        <div class="login-or" role="separator">or email</div>

        <form class="login-form" onsubmit="event.preventDefault();">
          <div class="login-field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" autocomplete="email" placeholder="your@email.com">
          </div>
          <div class="login-field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••">
          </div>
          <div class="login-actions">
            <button type="submit" class="propart-btn-primary">Sign in</button>
          </div>
        </form>

        <p class="login-footer">
          New here?
          <a class="propart-link" href="./index.html">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
